{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 | CalmSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f7f4f1; color: #4f3f2f; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { border-radius: 28px; padding: 48px; background: white; box-shadow: 0 20px 50px rgba(75,54,37,0.08); border: 1px solid rgba(181,145,101,0.2); text-align: center; max-width: 480px; }

        h2 { color: #7a5235; margin-bottom: 12px; }
        p { color: #6d4a33; }
        .btn-home { border-radius: 28px; background: #bf8b58; border: none; color: #fff; padding: 10px 28px; font-weight: 600; text-decoration: none; display: inline-block; margin-top: 16px; }
        .btn-home:hover { background: #a87648; color: #fff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>500</h1>
        <h2>Something went wrong</h2>

        <a href="{% url 'index' %}" class="btn-home">Return Home</a>
    </div>
</body>
</html>
